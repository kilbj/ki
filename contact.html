<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言 — 牢大</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="logo">牢大的个人博客</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="blog.html">文章</a></li>
        <li><a href="reading.html">书单</a></li>
        <li><a href="about.html">关于</a></li>
        <li><a href="contact.html" class="active">留言</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>✉️ 给我留言</h1>
      <p>有任何问题或想法？欢迎留言交流</p>
    </div>
  </div>

  <div class="container">
    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <label for="name">你的名字 *</label>
        <input type="text" id="name" required placeholder="请输入你的名字">
      </div>

      <div class="form-group">
        <label for="email">邮箱 *</label>
        <input type="email" id="email" required placeholder="example@email.com">
      </div>

      <div class="form-group">
        <label for="subject">主题</label>
        <select id="subject">
          <option value="">请选择</option>
          <option value="feedback">文章反馈</option>
          <option value="question">技术问题</option>
          <option value="other">其他</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">留言内容 *</label>
        <textarea id="message" required placeholder="写下你想说的话..."></textarea>
      </div>

      <button type="submit" class="submit-btn">发送留言 ✈️</button>
    </form>

    <div id="formSuccess" style="display:none;text-align:center;padding:40px 0;">
      <p style="font-size:48px;margin-bottom:12px;">✅</p>
      <h3>感谢留言！</h3>
      <p style="color:#888;margin:10px 0 20px;">我会尽快回复你 😊</p>
      <button onclick="location.reload()" class="submit-btn">再写一条</button>
    </div>

    <div style="margin-top:40px;">
      <h2 class="section-title">其他联系方式</h2>
      <div class="contact-links">
        <div class="contact-item">
          <span class="icon">🐙</span>
          <div>
            <div class="label">GitHub</div>
            <div class="info">@laoda</div>
          </div>
        </div>
        <div class="contact-item">
          <span class="icon">✉️</span>
          <div>
            <div class="label">Email</div>
            <div class="info">laoda@example.com</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="container">
      <p>© 2025 <span>牢大的个人博客</span>. 用 ❤️ 制作</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // 表单提交
    var form = document.getElementById('contactForm');
    var success = document.getElementById('formSuccess');
    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        form.style.display = 'none';
        success.style.display = 'block';
      });
    }
  </script>
</body>
</html>
